<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Shopping Carts</h1>
    <h3>laptop 20,000<button onclick="addproducts('laptop',20000)">ADD</button></h3>
    <h3>mouse 500<button onclick="addproducts('mouse',500)">ADD</button></h3>

    <h1>carts:</h1>
    <div id="output"></div>

    <h1>total:</h1>
    <div id="output2"></div>


   <script>
     let products = []
     let total = 0

    function addproducts(name, price){

        const product = {
           prod: name,
           price: price,
           quantity: 0
         }

        let check = products.find(item => item.prod === name)

        if(check){
            check.quantity++
        }
        else{
            product.quantity++
            products.push(product)
        }

        let text = ""

        for(let i = 0; i < products.length; i++){
 
            if(products[i].prod === "laptop"){
              if(i === 0){total+= product.price}
                text += `<h3>${products[i].prod} ${products[i].quantity}x </h3>`
            }
            else if(products[i].prod === "mouse"){
                 if(i === 0){total+=product.price}
                text += `<h3>${products[i].prod} ${products[i].quantity}x</h3>`
            }

        }

        document.getElementById("output").innerHTML = text
        document.getElementById("output2").innerHTML = total
    }
   </script>

</body>
</html>
