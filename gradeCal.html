<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>average calculator</h1>
    <input id="en" placeholder="english"><br>
    <input id="math"placeholder="math"><br>
    <input id="sc" placeholder="science"><br>
    <input id="esp" placeholder="esp"><br>
    <input id="tle" placeholder="tle"><br>
    <button onclick="addav()">compute</button><br>
    <input id="output" placeholder="average">
    <h1 id="try"></h1>

    <script>
        function addav(){
            try{
         let en = Number(document.getElementById("en").value)
         let math = Number(document.getElementById("math").value)
         let sc = Number( document.getElementById("sc").value)
         let esp = Number(document.getElementById("esp").value)
         let tle = Number(document.getElementById("tle").value)
         let total = en + math + sc + esp + tle 
         let result = total / 5 

         document.getElementById("output").value = result
            }catch(err){
                document.getElementById("try").innerHTML = err.name +err.message
            }
        }
     
    </script>
    

</body>
</html>
