<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Products:</h1>
    <h3>Laptop - 20,000 <button onclick="addLaptop()">ADD</button ><br></h3>
    <h3>Mouse - 500<button onclick="addMouse()">ADD</button></h3>

    <h3 id="input"></h3>

    <h1>Carts:</h1>

    <div id="output"></div>
    <div id="output2"></div>

    <h1>Total:</h1>

    <div id="total"></div>
    
    <script>
      let products = []  
     
      let total = 0


      function addMouse(){
       
        let mouse = "mouse"
        let price = 500
        let quantity = 0

        const prodmouse = {
            prod: mouse,
            price: price,
            quantity: quantity
          
        }
         total += prodmouse.price

        products.push(prodmouse)
        products.forEach(item => {if(item.prod === "mouse"){prodmouse.quantity++}})
        
        displayprod()
        
      }
     
     function addLaptop(){
         let laptop = "laptop"
         let price = 20000
         let quantity = 0

         const prodlaptop = {
           prod: laptop,
           price: price,
           quantity: quantity
         }

         total += prodlaptop.price

        products.push(prodlaptop)

        products.forEach(item => {if(item.prod === "laptop"){prodlaptop.quantity++}})
    
     displayprod()
        
     }
     function displayprod(){
         let text = ""
        for(let i = 0; i < products.length; i++){

            text = `${products[i].prod} ${products[i].quantity}`+"x" + "<br>"
        }
       
        document.getElementById("output").innerHTML += text
        document.getElementById("total").innerHTML = total

     }

     

     

    </script>
</body>
</html>
